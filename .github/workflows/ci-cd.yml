name: CI/CD — Library App

# Запускается при пуше и пул-реквесте в ветку main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Глобальные переменные — адрес реестра и имя образа
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════
  # CI: Запуск тестов
  # ═══════════════════════════════════════════
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий в раннер
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # 4. Запускаем тесты
      # Используем SQLite — реальная БД не нужна
      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ═══════════════════════════════════════════
  # CD: Сборка и публикация Docker-образа
  # Запускается только при пуше (не при PR)
  # И только если тесты прошли (needs: test)
  # ═══════════════════════════════════════════
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # нужно для записи в GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Настраиваем Docker Buildx (поддержка multi-stage)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Авторизуемся в GitHub Container Registry
      # GITHUB_TOKEN создаётся автоматически — ничего дополнительно настраивать не нужно
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Генерируем теги для образа (latest, sha, branch и т.д.)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Собираем и публикуем образ
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Кешируем слои для ускорения повторных сборок
          cache-from: type=gha
          cache-to: type=gha,mode=max
